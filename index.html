<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeConecte</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Estilos próprios -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="chatbot/chatbot.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="fixed-top" style="background-color: #27242f; border-bottom: 0.5px solid rgba(255,255,255,0.1);">

    <!-- Barra superior: logo + busca -->
    <div style="padding: 0.65rem 0; border-bottom: 0.5px solid rgba(255,255,255,0.08);">
      <div class="container d-flex align-items-center justify-content-between">

        <a href="#" onclick="mostrarPagina('home')"
          style="font-size: 30px; font-weight: 500; text-decoration: none; letter-spacing: -0.2px;
                 background: linear-gradient(135deg, #93c8fa, #d4c7ec);
                 -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          SeConecte
        </a>

        <div class="d-flex align-items-center gap-3">

          <div style="position: relative; width: 480px;">
            <div style="display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07);
                        border: 0.5px solid rgba(255,255,255,0.12); border-radius: 24px;
                        padding: 0.45rem 1.1rem; width: 100%;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" id="busca-input" placeholder="Buscar..."
                oninput="executarBusca(this.value)"
                style="background: transparent; border: none; outline: none; color: #fff;
                       font-size: 15px; width: 100%;">
            </div>
            <div id="busca-resultados" class="d-none"></div>
          </div>

        </div>
      </div>
    </div>

    <!-- Barra de navegação entre páginas -->
    <div style="background-color: #1f1c27;">
      <div class="container d-flex align-items-center justify-content-center" style="position: relative;">
        <button id="btn-voltar" onclick="voltarPagina()" class="d-none"
          onmouseenter="this.style.background='rgba(255,255,255,0.15)'; this.style.color='#fff';"
          onmouseleave="this.style.background='rgba(255,255,255,0.07)'; this.style.color='#c9b8f0';"
          style="position: absolute; left: 15px; display: flex; align-items: center; gap: 7px;
                 background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.12);
                 border-radius: 18px; padding: 0.3rem 1rem; color: #c9b8f0; font-size: 16px;
                 cursor: pointer; transition: background 0.2s, color 0.2s; outline: none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="transform: rotate(180deg);">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
          Voltar
        </button>
        <a href="#" onclick="mostrarPagina('home')"         id="nav-home"      class="nb-link">Início</a>
        <div class="nb-div"></div>
        <a href="#" onclick="mostrarPagina('susdigital')"   id="nav-sus"       class="nb-link">SUS Digital</a>
        <div class="nb-div"></div>
        <a href="#" onclick="mostrarPagina('whatsapp')"     id="nav-whats"     class="nb-link">WhatsApp</a>
        <div class="nb-div"></div>
        <a href="#" onclick="mostrarPagina('googleagenda')" id="nav-agenda"    class="nb-link">Google Agenda</a>
        <div class="nb-div"></div>
        <a href="#" onclick="mostrarPagina('seguranca')"    id="nav-seguranca" class="nb-link">Segurança</a>
        <div class="nb-div"></div>
        <a href="#" onclick="mostrarPagina('sobre')"        id="nav-sobre"     class="nb-link">Sobre</a>
      </div>
    </div>

  </nav>

  <!-- CONTAINER DAS PÁGINAS (preenchido pelo router.js) -->
  <div id="app"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="chatbot/chatbot.js" defer></script>

</body>
</html>
